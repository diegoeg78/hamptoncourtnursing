kind = "web"
previewPath = "/"
title = "Hampton Court Nursing & Rehabilitation Center"
version = "1.0.0"
id = "artifacts/hampton-court"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25991
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/hampton-court run dev"

[services.env]
PORT = "25991"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/hampton-court", "run", "build"]
publicDir = "artifacts/hampton-court/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
